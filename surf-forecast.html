<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surferado 5000 — Surf Forecast</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #0B1120; --bg2: #111827; --card: rgba(255,255,255,0.03); --card-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
  --text: #F1F5F9; --text2: #94A3B8; --text3: #475569;
  --blue: #3B82F6; --cyan: #06B6D4; --green: #10B981; --yellow: #F59E0B; --orange: #F97316; --red: #EF4444;
  --r: 12px; --rs: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* Header */
header { background:linear-gradient(180deg,rgba(15,23,42,0.95),var(--bg)); border-bottom:1px solid var(--border); backdrop-filter:blur(20px); position:sticky; top:0; z-index:100; }
.header-inner { max-width:1400px; margin:0 auto; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.region-tabs { display:flex; gap:4px; background:rgba(255,255,255,0.04); border-radius:10px; padding:3px; }
.region-tab { padding:8px 18px; border:none; background:transparent; color:var(--text2); font-family:inherit; font-size:0.85em; font-weight:600; border-radius:8px; cursor:pointer; transition:all 0.25s; white-space:nowrap; }
.region-tab:hover { color:var(--text); background:rgba(255,255,255,0.04); }
.region-tab.active { background:rgba(59,130,246,0.15); color:var(--blue); box-shadow:0 0 20px rgba(59,130,246,0.1); }
.header-title { font-size:0.85em; color:var(--text2); font-weight:500; }
.header-title b { color:var(--text); font-weight:700; }

/* Container */
.container { max-width:1400px; margin:0 auto; padding:16px 20px; }

/* Toolbar */
.toolbar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.tb-group { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.tb-btn { background:var(--card); border:1px solid var(--border); color:var(--text2); padding:6px 14px; border-radius:var(--rs); cursor:pointer; font-family:inherit; font-size:0.78em; font-weight:600; transition:all 0.25s; }
.tb-btn:hover { background:var(--card-hover); color:var(--text); border-color:var(--border-hover); }
.tb-btn.active { background:rgba(59,130,246,0.1); border-color:rgba(59,130,246,0.3); color:var(--blue); }
.tb-btn:disabled { opacity:0.4; cursor:default; }
.tb-label { font-size:0.72em; color:var(--text3); }
.tb-select { background:var(--card); border:1px solid var(--border); color:var(--text2); padding:5px 10px; border-radius:var(--rs); font-family:inherit; font-size:0.75em; }

/* Surf Now Card */
.surf-now { background:linear-gradient(135deg,rgba(16,185,129,0.08),rgba(6,182,212,0.06)); border:1px solid rgba(16,185,129,0.2); border-radius:var(--r); padding:16px 20px; margin-bottom:14px; }
.surf-now-inner { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
.sn-badge { background:linear-gradient(135deg,var(--green),var(--cyan)); color:#0B1120; padding:6px 14px; border-radius:var(--rs); font-weight:800; font-size:0.9em; white-space:nowrap; }
.sn-detail { flex:1; min-width:200px; }
.sn-spot { font-size:1.1em; font-weight:800; }
.sn-info { font-size:0.8em; color:var(--text2); margin-top:4px; line-height:1.6; }
.sn-nav { display:inline-block; background:var(--green); color:#0B1120; padding:8px 18px; border-radius:var(--rs); font-weight:700; text-decoration:none; font-size:0.82em; transition:all 0.25s; }
.sn-nav:hover { filter:brightness(1.15); transform:translateY(-1px); }

/* Weather Cards */
.weather-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; scrollbar-width:thin; scrollbar-color:var(--text3) transparent; }
.weather-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:10px 14px; text-align:center; min-width:130px; flex:1; cursor:pointer; transition:all 0.25s; }
.weather-card:hover { background:var(--card-hover); border-color:var(--border-hover); }
.weather-card.active { border-color:rgba(59,130,246,0.4); background:rgba(59,130,246,0.06); box-shadow:0 0 20px rgba(59,130,246,0.08); }
.wc-day { font-weight:700; font-size:0.9em; }
.wc-icon { font-size:1.6em; margin:4px 0; }
.wc-temp { font-size:0.78em; color:var(--text2); }
.wc-detail { font-size:0.68em; color:var(--text3); margin-top:2px; }
.wc-sea { font-size:0.72em; color:var(--cyan); margin-top:3px; font-weight:600; }
.wc-tide { font-size:0.68em; color:var(--blue); margin-top:2px; }

/* Map */
#map { height:380px; border-radius:var(--r); border:1px solid var(--border); margin-bottom:14px; }

/* Legend */
.legend { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:12px; padding:8px; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:0.72em; color:var(--text2); }
.legend-dot { width:8px; height:8px; border-radius:50%; }

/* Day Selector */
.day-selector { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; position:sticky; top:56px; z-index:90; background:var(--bg); padding:10px 0; border-bottom:1px solid var(--border); margin-bottom:14px; }
.day-btn { padding:8px 16px; border:1px solid var(--border); background:var(--card); color:var(--text2); border-radius:var(--rs); cursor:pointer; font-family:inherit; font-size:0.85em; font-weight:600; transition:all 0.25s; }
.day-btn:hover { background:var(--card-hover); color:var(--text); }
.day-btn.active { background:rgba(59,130,246,0.12); color:var(--blue); border-color:rgba(59,130,246,0.3); }
.day-btn .sub { display:block; font-size:0.7em; margin-top:2px; font-weight:500; color:var(--text3); }
.day-btn.active .sub { color:var(--blue); opacity:0.7; }

/* Overview */
.overview { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:18px 20px; margin-bottom:14px; }
.overview h2 { color:var(--blue); font-size:1em; margin-bottom:8px; }
.overview p { line-height:1.7; color:var(--text2); font-size:0.88em; }
.overview strong { color:var(--green); }

/* Spot Cards */
.spots-list { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.spot-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); }
.spot-card:hover { background:var(--card-hover); border-color:var(--border-hover); transform:translateY(-1px); box-shadow:0 8px 25px rgba(0,0,0,0.2); }
.spot-card.rank-1 { border-color:rgba(16,185,129,0.3); background:rgba(16,185,129,0.03); }
.spot-card.rank-2 { border-color:rgba(59,130,246,0.2); background:rgba(59,130,246,0.02); }
.spot-card.rank-3 { border-color:rgba(59,130,246,0.12); }

.spot-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; gap:8px; }
.spot-rank { font-size:1.3em; font-weight:900; min-width:32px; }
.spot-rank.r1 { color:var(--green); }
.spot-rank.r2 { color:var(--blue); }
.spot-rank.r3 { color:var(--cyan); }
.spot-rank.rn { color:var(--text3); }
.spot-name { font-size:1.05em; font-weight:700; }
.spot-type { font-size:0.72em; color:var(--text3); margin-top:2px; }
.tag { display:inline-block; padding:1px 7px; border-radius:4px; font-size:0.68em; font-weight:600; margin-left:4px; }
.tag-drive { background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--text3); }
.tag-dist { background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); color:#a78bfa; }
.tag-sea { background:rgba(6,182,212,0.1); border:1px solid rgba(6,182,212,0.2); color:var(--cyan); }
.tag-tide { background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); color:var(--blue); font-size:0.65em; }

/* Sessions */
.sessions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
@media (max-width:700px) { .sessions { grid-template-columns:1fr; } }
.session { background:rgba(0,0,0,0.2); border-radius:var(--rs); padding:10px 12px; }
.session-label { font-size:0.72em; text-transform:uppercase; letter-spacing:0.5px; color:var(--text3); margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }

/* Score */
.score-pill { font-size:0.72em; padding:3px 10px; border-radius:20px; font-weight:700; letter-spacing:0.3px; }
.score-5 { background:rgba(16,185,129,0.15); color:var(--green); }
.score-4 { background:rgba(59,130,246,0.15); color:var(--blue); }
.score-3 { background:rgba(245,158,11,0.15); color:var(--yellow); }
.score-2 { background:rgba(249,115,22,0.15); color:var(--orange); }
.score-1 { background:rgba(239,68,68,0.12); color:var(--red); }

.sg-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; }
.sg-item { font-size:0.8em; }
.sg-label { font-size:0.6em; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; }
.sg-val { font-weight:600; font-size:0.9em; }

/* Wind badges */
.wind-dir { display:inline-block; font-size:0.68em; padding:2px 6px; border-radius:4px; font-weight:700; }
.wind-offshore { background:rgba(16,185,129,0.15); color:var(--green); }
.wind-cross { background:rgba(245,158,11,0.15); color:var(--yellow); }
.wind-onshore { background:rgba(239,68,68,0.12); color:var(--red); }
.wind-light { background:rgba(6,182,212,0.12); color:var(--cyan); }

.note { font-size:0.78em; color:var(--text2); margin-top:8px; line-height:1.5; }
.sources { margin-top:6px; font-size:0.68em; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.sources a { color:var(--text3); text-decoration:none; transition:color 0.2s; }
.sources a:hover { color:var(--blue); }
.no-surfline { color:var(--orange); font-style:italic; font-size:0.95em; }
.nav-link { background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); border-radius:4px; padding:1px 7px; color:var(--blue); text-decoration:none; font-size:1em; transition:all 0.2s; }
.nav-link:hover { background:rgba(59,130,246,0.2); }

/* Conditions */
.day-conditions { text-align:center; color:var(--text2); margin-bottom:14px; font-size:0.88em; max-width:960px; margin-left:auto; margin-right:auto; line-height:1.6; }

/* Toast */
.toast { position:fixed; top:80px; right:20px; background:var(--bg2); border:1px solid var(--border-hover); border-radius:var(--r); padding:16px 18px; z-index:200; max-width:380px; font-size:0.82em; box-shadow:0 20px 50px rgba(0,0,0,0.5); animation:toastIn 0.35s cubic-bezier(0.4,0,0.2,1); }
.toast h4 { color:var(--blue); margin-bottom:8px; font-size:0.95em; }
.toast-item { margin:4px 0; padding:5px 8px; background:rgba(0,0,0,0.3); border-radius:6px; color:var(--text2); }
.toast-item b { color:var(--text); }
.toast-close { position:absolute; top:8px; right:12px; color:var(--text3); cursor:pointer; font-size:1.1em; background:none; border:none; }
@keyframes toastIn { from { transform:translateX(120%) scale(0.95); opacity:0; } to { transform:translateX(0) scale(1); opacity:1; } }

/* Footer */
.footer { text-align:center; color:var(--text3); font-size:0.72em; padding:20px; line-height:1.8; border-top:1px solid var(--border); max-width:1400px; margin:0 auto; }
.footer a { color:var(--text3); text-decoration:none; }
.footer a:hover { color:var(--blue); }

/* Responsive */
@media (max-width:640px) {
  .header-inner { padding:10px 14px; }
  .container { padding:12px 14px; }
  .region-tab { padding:6px 12px; font-size:0.78em; }
  #map { height:280px; }
  .weather-card { min-width:110px; padding:8px 10px; }
  .spot-card { padding:12px 14px; }
}
</style>
</head>

  </div>

  <div id="overview"></div>
  <div class="day-selector" id="day-selector"></div>
  <div id="spots-container"></div>
</div>

<div class="footer" id="footer"></div>

// ── Time filtering: only show current + future slots ──
function getVisibleDays() {
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const hour = now.getHours();
  return R.days.filter(d => {
    if (!d.date) return true;
    if (d.date > todayStr) return true; // future day — always show
    if (d.date < todayStr) return false; // past day — hide
    // Today: check if there's still a relevant session
    if (d.pmOnly) return hour < 18; // PM-only day: show if before 6pm
    if (hour >= 18) return false; // past 6pm, today is done
    return true; // today, still has sessions
  });
}

// For today's day, determine if AM session is still relevant
function isSessionVisible(dayObj, session) {
  if (!dayObj.date) return true;
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  if (dayObj.date !== todayStr) return true; // not today — show both
  if (dayObj.pmOnly) return session === 'pm';
  const hour = now.getHours();
  if (session === 'am' && hour >= 12) return false; // AM gone after noon
  return true;
}

function haversine(lat1,lon1,lat2,lon2) {
  const R2=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R2*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function estDrive(km) {
  const m=Math.round(km/55*60*1.3);
  if(m<5)return"<5min"; if(m<60)return m+"min";
  const h=Math.floor(m/60),r=m%60; return r>0?h+"hr"+String(r).padStart(2,'0'):h+"hr";
}
function dirName(d){const n=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return n[Math.round(d/22.5)%16];}

function scorePill(s) {
  const labels={5:'EPIC',4:'GOOD',3:'FAIR',2:'MEH',1:'SKIP'};
  return `<span class="score-pill score-${s}">${s}/5 ${labels[s]}</span>`;
}
function windBadge(wt) {
  const l={offshore:'OFFSHORE',cross:'CROSS',onshore:'ONSHORE',light:'CALM'};
  const c=wt==='offshore'||wt==='light'?'wind-offshore':wt==='cross'?'wind-cross':'wind-onshore';
  if(wt==='light')return `<span class="wind-dir wind-light">${l[wt]}</span>`;
  return `<span class="wind-dir ${c}">${l[wt]}</span>`;
}

// ── Build map ──
map = L.map('map',{zoomControl:true}).setView(GR.mapCenter, GR.mapZoom);
mapTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OSM &copy; CARTO', maxZoom:18
}).addTo(map);

function buildMap() {
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  if(polyline)map.removeLayer(polyline);
  map.setView(R.mapCenter, R.mapZoom);
  R.spots.forEach(s=>{
    const m=L.circleMarker([s.lat,s.lng],{radius:7,fillColor:'#3b82f6',color:'#fff',weight:1.5,fillOpacity:0.8}).addTo(map);
    let p=`<div style="min-width:220px;font-size:12px;font-family:Inter,sans-serif"><b>${s.name}</b><br><small style="color:#94a3b8">${s.type}</small><br>Offshore: ${s.offshore} · Swell: ${s.swell}<br>🌡️ Sea: ${s.seaTemp}<hr style="border-color:#333;margin:4px 0">`;
    if(s.surfline)p+=`<a href="${s.surfline}" target="_blank" style="color:#3b82f6">📊 Surfline</a><br>`;
    else p+=`<em style="color:#f97316">⚠️ No Surfline</em><br>`;
    if(s.stormrider)p+=`<a href="${s.stormrider}" target="_blank" style="color:#3b82f6">🗺️ StormRider</a><br>`;
    if(s.windyApp)p+=`<a href="${s.windyApp}" target="_blank" style="color:#10b981">🌬️ Windy.app</a><br>`;
    p+=`<small style="color:#666">${s.lat}, ${s.lng}</small></div>`;
    m.bindPopup(p);
    markers[s.name]=m;
  });
  polyline=L.polyline(R.spots.map(s=>[s.lat,s.lng]),{color:'#1e3a5f',weight:1.5,dashArray:'5,5',opacity:0.4}).addTo(map);
}

// ── Render weather cards ──
function renderWeather() {
  const bar=document.getElementById('weather-bar');
  const visible=getVisibleDays();
  const visibleKeys=new Set(visible.map(d=>d.key));
  // Build weather cards only for visible days
  const visibleWeather=R.weather.filter((_,i)=>visibleKeys.has(R.days[i].key));
  const visibleIndices=R.weather.map((_,i)=>i).filter(i=>visibleKeys.has(R.days[i].key));
  bar.innerHTML=visibleWeather.map((w,vi)=>`
    <div class="weather-card${vi===0?' active':''}" data-origidx="${visibleIndices[vi]}" onclick="selectWeatherDay(${visibleIndices[vi]})">
      <div class="wc-day">${w.day}</div><div class="wc-icon">${w.icon}</div>
      <div class="wc-temp">${w.temp} · ${w.desc}</div>
      <div class="wc-detail">${w.detail}</div>
      <div class="wc-sea">🌊 ${w.sea}</div>
      <div class="wc-tide">${w.tide}</div>
    </div>`).join('');
}
function selectWeatherDay(i) {
  document.querySelectorAll('.weather-card').forEach(c=>c.classList.remove('active'));
  const clicked=document.querySelector(`.weather-card[data-origidx="${i}"]`);
  if(clicked)clicked.classList.add('active');
  showDay(R.days[i].key);
}

// ── Render day selector ──
function renderDays() {
  const visible=getVisibleDays();
  document.getElementById('day-selector').innerHTML=visible.map((d,i)=>
    `<button class="day-btn${i===0?' active':''}" data-day="${d.key}" onclick="showDay('${d.key}')">${d.label}<span class="sub">${d.sub}</span></button>`
  ).join('');
}

// ── Render overview ──
function renderOverview() {
  const visible=getVisibleDays();
  if(visible.length===0){
    document.getElementById('overview').innerHTML=`<div class="overview"><h2>📋 ${R.title.replace(/<[^>]+>/g,'')}</h2><p style="color:var(--text3)">This forecast period has ended. All sessions are in the past.</p></div>`;
    return;
  }
  // Build overview from only visible days' lines
  const lines=visible.map(d=>R.overviewLines[d.key]).filter(Boolean).join('<br>');
  document.getElementById('overview').innerHTML=`<div class="overview"><h2>📋 Overview — ${R.title.replace(/<[^>]+>/g,'')}</h2><p>${lines||'No overview available.'}</p></div>`;
}

// ── Render footer ──
function renderFooter() {
  document.getElementById('footer').innerHTML=`<strong>Forecast sources:</strong>
    🌊 Waves: <a href="https://www.surfline.com" target="_blank">Surfline LOTUS</a> + <a href="https://marine-api.open-meteo.com" target="_blank">Open-Meteo Marine</a> ·
    🌬️ Wind: <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> + <a href="https://windy.app" target="_blank">Windy.app</a> ·
    📊 Spot info: <a href="https://www.stormrider.surf" target="_blank">Stormrider</a><br>
    📡 <strong>Live Update</strong> pulls real-time data from Surfline API (waves + wind) and Open-Meteo (wind at GPS).<br>
    ⚠️ Surfline tends to over-report wind. Open-Meteo at exact GPS is generally more reliable.<br>
    🌊 Tides approximate (${activeRegion==='gardenRoute'?'Knysna':activeRegion==='capeTown'?'Simon\'s Town':'Saint-Jean-de-Luz'} reference).`;
}

// ── Switch Region ──
function switchRegion(region) {
  activeRegion=region;
  R=REGIONS[region];
  document.querySelectorAll('.region-tab').forEach(t=>t.classList.toggle('active',t.dataset.region===region));
  document.getElementById('header-title').innerHTML=R.title;
  renderLocSelect();
  renderWeather();
  renderDays();
  renderOverview();
  renderFooter();
  buildMap();
  const visible=getVisibleDays();
  currentDay=visible.length>0?visible[0].key:R.days[0].key;
  showDay(currentDay);
  updateSurfNow();
}

// ── Show Day ──
function showDay(day) {
  currentDay=day;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.toggle('active',b.dataset.day===day));
  // Also sync weather cards (using data-origidx)
  const dayIdx=R.days.findIndex(d=>d.key===day);
  document.querySelectorAll('.weather-card').forEach(c=>c.classList.toggle('active',parseInt(c.dataset.origidx)===dayIdx));

  const data=R.dayData[day];
  if(!data)return;
  const container=document.getElementById('spots-container');
  let spotsList=[...data.spots];

  if(sortMode==='distance'){
    spotsList.sort((a,b)=>{
      const sa=R.spots.find(x=>x.name===a.name), sb=R.spots.find(x=>x.name===b.name);
      if(!sa||!sb)return 0;
      return haversine(userLoc.lat,userLoc.lng,sa.lat,sa.lng)-haversine(userLoc.lat,userLoc.lng,sb.lat,sb.lng);
    });
  }

  // Update map markers
  spotsList.forEach(s=>{
    if(markers[s.name]){
      const best=Math.max(s.am?s.am.score:0,s.pm?s.pm.score:0);
      markers[s.name].setStyle({fillColor:scoreColor(best),radius:best>=5?13:best>=4?9:best>=3?7:5});
    }
  });

  // Tide info
  const tides=R.tideData[day]||[];
  const tideStr=tides.map(t=>`${t.type==='H'?'▲':'▼'}${t.time} (${t.height}m)`).join(' · ');

  let html=`<p class="day-conditions">${data.conditions}<br><span style="color:var(--blue);font-size:0.85em">🌊 Tides: ${tideStr}</span></p><div class="spots-list">`;

  spotsList.forEach((s,i)=>{
    const best=Math.max(s.am?s.am.score:0,s.pm?s.pm.score:0);
    const rc=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    const rn=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    const sp=R.spots.find(x=>x.name===s.name);
    let distInfo='', navLink='';
    if(sp){
      const d=haversine(userLoc.lat,userLoc.lng,sp.lat,sp.lng);
      distInfo=`<span class="tag tag-dist">📍 ${Math.round(d)}km ~${estDrive(d)}</span>`;
      navLink=`<a href="https://www.google.com/maps/dir/?api=1&destination=${sp.lat},${sp.lng}&travelmode=driving" target="_blank" class="nav-link">🧭 Navigate</a>`;
    }
    const tp=R.tidePrefs[s.name];
    const tideNote=tp?`<span class="tag tag-tide">🌊 ${tp}</span>`:'';

    let src='<div class="sources">';
    if(sp&&sp.surfline)src+=`<a href="${sp.surfline}" target="_blank">📊 Surfline</a>`;
    else src+='<span class="no-surfline">⚠️ No Surfline</span> ';
    if(sp&&sp.stormrider)src+=`<a href="${sp.stormrider}" target="_blank">🗺️ Stormrider</a>`;
    if(sp&&sp.windyApp)src+=`<a href="${sp.windyApp}" target="_blank">🌬️ Windy</a>`;
    src+=navLink+'</div>';

    html+=`<div class="spot-card ${rc}">
      <div class="spot-header">
        <span class="spot-rank ${rn}">#${i+1}</span>
        <div style="flex:1">
          <span class="spot-name">${s.name}</span>
          ${sp?`<span class="tag tag-sea">🌡️${sp.seaTemp}</span>`:''}
          ${distInfo}
          <div class="spot-type">${sp?sp.type+' · Offshore: '+sp.offshore:''}${tideNote?'<br>'+tideNote:''}</div>
        </div>
      </div>
      <div class="sessions">`;

    const dayObj=R.days.find(d=>d.key===day);
    if(s.am && isSessionVisible(dayObj,'am')){
      html+=`<div class="session">
        <div class="session-label"><span>☀️ MORNING</span>${scorePill(s.am.score)}</div>
        <div class="sg-grid">
          <div class="sg-item"><div class="sg-label">Surf</div><div class="sg-val">${s.am.surf}</div></div>
          <div class="sg-item"><div class="sg-label">Swell</div><div class="sg-val" style="font-size:0.78em">${s.am.swell}</div></div>
          <div class="sg-item"><div class="sg-label">Wind ${windBadge(s.am.wt)}</div><div class="sg-val" style="font-size:0.78em">${s.am.wind}</div></div>
        </div></div>`;
    }
    if(s.pm && isSessionVisible(dayObj,'pm')){
      html+=`<div class="session">
        <div class="session-label"><span>🌅 AFTERNOON</span>${scorePill(s.pm.score)}</div>
        <div class="sg-grid">
          <div class="sg-item"><div class="sg-label">Surf</div><div class="sg-val">${s.pm.surf}</div></div>
          <div class="sg-item"><div class="sg-label">Swell</div><div class="sg-val" style="font-size:0.78em">${s.pm.swell}</div></div>
          <div class="sg-item"><div class="sg-label">Wind ${windBadge(s.pm.wt)}</div><div class="sg-val" style="font-size:0.78em">${s.pm.wind}</div></div>
        </div></div>`;
    }
    html+=`</div><div class="note">${s.note}</div>${src}</div>`;
  });
  html+='</div>';
  container.innerHTML=html;
}

// ── Location ──
function getLocation() {
  const btn=document.getElementById('loc-btn');
  if(!navigator.geolocation){alert('GPS not available');return;}
  btn.textContent='⏳ GPS...';
  navigator.geolocation.getCurrentPosition(
    pos=>{userLoc={lat:pos.coords.latitude,lng:pos.coords.longitude,name:"GPS"};btn.textContent=`📍 ${userLoc.lat.toFixed(3)},${userLoc.lng.toFixed(3)}`;showDay(currentDay);updateSurfNow();},
    err=>{btn.textContent='📍 GPS';alert('GPS: '+err.message);},
    {enableHighAccuracy:true,timeout:10000}
  );
}
function handleLocSelect(val) {
  if(!val||!R.locPresets[val])return;
  userLoc={...R.locPresets[val]};
  document.getElementById('loc-btn').textContent='📍 GPS';
  showDay(currentDay); updateSurfNow();
}
function toggleSort() {
  const btn=document.getElementById('sort-toggle');
  sortMode=sortMode==='score'?'distance':'score';
  btn.textContent=sortMode==='score'?'Sort: Score ⭐':'Sort: Nearest 📍';
  btn.classList.toggle('active',sortMode==='distance');
  showDay(currentDay);
}

// ── Extract Surfline spot ID from URL ──
function getSurflineId(spot) {
  if (!spot.surfline) return null;
  const m = spot.surfline.match(/\/([a-f0-9]{24})$/);
  return m ? m[1] : null;
}

// ── Refresh Live: Open-Meteo wind + Surfline wave & wind ──
async function refreshWind() {
  const btn=document.getElementById('refresh-btn');
  btn.textContent='⏳ Fetching...'; btn.disabled=true;
  const keySpots=R.spots.slice(0,6); // top 6 spots
  try {
    // Parallel: Open-Meteo wind + Surfline wave/wind for each spot
    const results=await Promise.all(keySpots.map(async s=>{
      const result = {name:s.name, offshore:s.offshore};
      // Open-Meteo wind
      try {
        const tz=activeRegion==='basque'?'Europe/Paris':'Africa/Johannesburg';
        const url=`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m&timezone=${tz}`;
        const r=await fetch(url); const d=await r.json();
        result.om={wind:d.current.wind_speed_10m,dir:d.current.wind_direction_10m,gust:d.current.wind_gusts_10m,time:d.current.time};
      } catch(e){ result.om=null; }
      // Surfline wave + wind
      const slId = getSurflineId(s);
      if(slId){
        try {
          const [waveR,windR] = await Promise.all([
            fetch(`https://services.surfline.com/kbyg/spots/forecasts/wave?spotId=${slId}&days=1&intervalHours=3`).then(r=>r.json()),
            fetch(`https://services.surfline.com/kbyg/spots/forecasts/wind?spotId=${slId}&days=1&intervalHours=3`).then(r=>r.json())
          ]);
          // Find closest forecast entry to now
          const now=Date.now()/1000;
          const pickClosest=(arr)=>arr?.reduce((a,b)=>Math.abs(b.timestamp-now)<Math.abs(a.timestamp-now)?b:a);
          const wv=pickClosest(waveR?.data?.wave);
          const wd=pickClosest(windR?.data?.wind);
          result.sl={};
          if(wv){result.sl.surfMin=wv.surf?.min?.toFixed(1);result.sl.surfMax=wv.surf?.max?.toFixed(1);result.sl.surfText=wv.surf?.humanRelation;
            if(wv.swells?.[0]){result.sl.swellH=wv.swells[0].height?.toFixed(1);result.sl.swellP=wv.swells[0].period?.toFixed(0);result.sl.swellD=dirName(wv.swells[0].direction);}}
          if(wd){result.sl.wind=wd.speed?.toFixed(1);result.sl.windDir=dirName(wd.direction);result.sl.gust=wd.gust?.toFixed(1);result.sl.windType=wd.directionType;}
        } catch(e){ result.sl=null; }
      } else { result.sl=null; }
      return result;
    }));
    const old=document.getElementById('wind-toast'); if(old)old.remove();
    let html=`<div class="toast" id="wind-toast" style="max-width:480px;max-height:80vh;overflow-y:auto"><button class="toast-close" onclick="this.parentElement.remove()">✕</button><h4>📡 Live Conditions Now</h4>`;
    results.forEach(r=>{
      html+=`<div class="toast-item" style="margin:6px 0;padding:6px 8px"><b>${r.name}</b> <span style="color:var(--text3);font-size:0.85em">offshore: ${r.offshore}</span><br>`;
      if(r.om) html+=`<span style="color:var(--cyan);font-size:0.85em">Open-Meteo:</span> ${r.om.wind} kph ${dirName(r.om.dir)} (${r.om.gust}g)<br>`;
      if(r.sl){
        if(r.sl.wind) html+=`<span style="color:var(--blue);font-size:0.85em">Surfline:</span> ${r.sl.wind} kph ${r.sl.windDir} (${r.sl.gust}g) · ${r.sl.windType||''}<br>`;
        if(r.sl.surfMin) html+=`<span style="color:var(--green);font-size:0.85em">Waves:</span> ${r.sl.surfMin}-${r.sl.surfMax}m ${r.sl.surfText||''} · ${r.sl.swellH}m@${r.sl.swellP}s ${r.sl.swellD}`;
      }
      if(!r.sl) html+=`<span style="color:var(--text3);font-size:0.8em">No Surfline data</span>`;
      html+=`</div>`;
    });
    const ts=results[0]?.om?.time?.replace('T',' ')||new Date().toLocaleTimeString();
    html+=`<div style="margin-top:8px;font-size:0.7em;color:var(--text3)">Sources: Open-Meteo (wind) + Surfline API (waves+wind) · ${ts}</div></div>`;
    document.body.insertAdjacentHTML('beforeend',html);
    setTimeout(()=>document.getElementById('wind-toast')?.remove(),30000);
    document.getElementById('last-updated').textContent=`✓ ${new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) { document.getElementById('last-updated').textContent='❌ Error'; console.error(e); }
  btn.textContent='🔄 Refresh'; btn.disabled=false;
}

// ── Surf Now ──
function updateSurfNow() {
  const now=new Date(), hour=now.getHours();
  const dateStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  // Find today's day key from the days array
  const todayDay=R.days.find(d=>d.date===dateStr);
  const visible=getVisibleDays();
  const dayKey=todayDay?todayDay.key:(visible.length>0?visible[0].key:R.days[0].key);
  const session=(dayKey==='today_pm')?'pm':(hour<11?'am':'pm');
  const sessionLabel=session==='am'?'☀️ Morning':'🌅 Afternoon';
  const data=R.dayData[dayKey];
  if(!data){document.getElementById('surf-now').innerHTML='';return;}

  let best=null, bestScore=0;
  data.spots.forEach(s=>{
    const sc=session==='am'?(s.am?.score||0):(s.pm?.score||0);
    if(sc>bestScore){bestScore=sc;best=s;}
    else if(sc===bestScore&&best){
      const sp1=R.spots.find(x=>x.name===best.name),sp2=R.spots.find(x=>x.name===s.name);
      if(sp1&&sp2&&haversine(userLoc.lat,userLoc.lng,sp2.lat,sp2.lng)<haversine(userLoc.lat,userLoc.lng,sp1.lat,sp1.lng))best=s;
    }
  });
  if(!best){document.getElementById('surf-now').innerHTML='';return;}

  const sp=R.spots.find(x=>x.name===best.name);
  const dist=sp?Math.round(haversine(userLoc.lat,userLoc.lng,sp.lat,sp.lng)):0;
  const drive=sp?estDrive(dist):'';
  const sData=session==='am'?best.am:best.pm;
  const wB=sData?windBadge(sData.wt):'';
  const navUrl=sp?`https://www.google.com/maps/dir/?api=1&destination=${sp.lat},${sp.lng}&travelmode=driving`:'#';

  const tides=R.tideData[dayKey]||[];
  const nowMins=hour*60+now.getMinutes();
  let nextTide=tides.find(t=>{const[h,m]=t.time.split(':').map(Number);return h*60+m>nowMins;})||tides[0];
  const tideStr=nextTide?`Next: ${nextTide.type==='H'?'▲High':'▼Low'} ${nextTide.time} (${nextTide.height}m)`:'';

  document.getElementById('surf-now').innerHTML=`<div class="surf-now"><div class="surf-now-inner">
    <div class="sn-badge">🏄 SURF NOW</div>
    <div class="sn-detail">
      <div class="sn-spot">${best.name} · ${scorePill(bestScore)}</div>
      <div class="sn-info">${sessionLabel} · ${sData?.surf||'?'} · ${wB}<br>
        📍 ~${dist}km (~${drive}) from ${userLoc.name} · ${tideStr}${R.tidePrefs[best.name]?' · 🌊 '+R.tidePrefs[best.name]:''}</div>
    </div>
    <a href="${navUrl}" target="_blank" class="sn-nav">🧭 Navigate →</a>
  </div></div>`;
}

// ── INIT ──
// Auto-detect best region: pick first with future/current days
function detectBestRegion() {
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  // Check regions in display order
  for (const key of ['capeTown','basque','gardenRoute']) {
    const reg = REGIONS[key];
    const hasFuture = reg.days.some(d => d.date >= todayStr);
    if (hasFuture) return key;
  }
  return 'capeTown'; // fallback
}
switchRegion(detectBestRegion());
